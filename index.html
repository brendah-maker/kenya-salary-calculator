    <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |

    <h1>Kenya Salary Calculator</h1>

    <p>This tool helps calculate your net or gross salary in Kenya, including PAYE, NSSF, and SHIF deductions (2026 rates).</p>

    <label for="mode">Choose Calculation Mode:</label>
    <select id="mode">
        <option value="net">Calculate Net Salary (from Gross)</option>
        <option value="gross">Calculate Gross Salary (from Net)</option>
    </select>

    <label for="grossSalary">Enter Amount (KES):</label>
    <input type="number" id="grossSalary" placeholder="e.g., 80000" />

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

    <div class="ad-placeholder">
        <!-- Google AdSense code can go here later -->
        Ad Placeholder
    </div>
</div>

<script src="script.js"></script>
</body>
