<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAYE Calculator – Kenya 2026</title>
<meta name="description" content="Kenya PAYE Calculator – Calculate Net Salary, PAYE, NSSF, SHIF deductions (2026 rates).">
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>
<div class="container">
    <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="faq.html">FAQ</a>
    </nav>

    <h1>Kenya PAYE Calculator</h1>

    <p class="intro-text">
        Instantly calculate your Net Salary, PAYE, NSSF, SHIF, and Housing Levy for 2025 & 2026.
    </p>

    <label for="mode">Calculation Mode:</label>
    <select id="mode">
        <option value="net">Net Salary</option>
        <option value="gross">Gross Salary</option>
    </select>

    <label for="grossSalary">Enter Amount (KES):</label>
    <input type="number" id="grossSalary" placeholder="e.g., 50000" />

    <label for="yearToggle">Select Year:</label>
    <select id="yearToggle">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
    </select>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

    <!-- Chart Placeholder -->
    <canvas id="salaryChart" width="400" height="400"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
