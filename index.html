<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya Salary Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Kenya Salary Calculator</h1>

        <!-- Mode selection -->
        <label for="mode">Choose Calculation Mode:</label>
        <select id="mode">
            <option value="net">Calculate Net Salary (from Gross)</option>
            <option value="gross">Calculate Gross Salary (from Net)</option>
        </select>

        <!-- Salary input -->
        <label for="grossSalary">Enter Amount (KES):</label>
        <input type="number" id="grossSalary" placeholder="e.g., 50000" />

        <!-- Calculate button -->
        <button onclick="calculate()">Calculate</button>

        <!-- Results -->
        <div id="result"></div>

        <!-- Example: Ad placeholder -->
        <div class="ad-placeholder">
            <!-- Ads will go here, e.g., Google AdSense code -->
            <!-- <script async src="..."></script> -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
