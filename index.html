<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAYE Calculator – Kenya 2026</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="faq.html">FAQ</a>
    </nav>

    <h1>Kenya PAYE Calculator 2026</h1>
    <p class="intro-text">
        Calculate your Net Salary, PAYE, NSSF, SHIF, and Housing Levy.
    </p>

    <label for="mode">Calculation Mode:</label>
    <select id="mode">
        <option value="net">Net Salary</option>
        <option value="gross">Gross Salary</option>
    </select>

    <label for="grossSalary">Enter Amount (KES):</label>
    <input type="number" id="grossSalary" placeholder="e.g., 50000" />

    <label for="grossSalary2">Compare With Another Salary (Optional, KES):</label>
    <input type="number" id="grossSalary2" placeholder="e.g., 60000" />

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

    <canvas id="salaryChart" width="400" height="400"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
